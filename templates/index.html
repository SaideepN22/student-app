<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
            animation: fadeIn 1s ease-in-out;
        }

        form {
            margin: 15px;
            animation: fadeIn 1.2s ease-in-out;
        }

        input {
            padding: 12px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
            width: 180px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00c6ff, #00ffcc);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00ffcc;
        }

        h3 {
            margin: 20px;
            color: #00ffcc;
            animation: fadeIn 1.5s ease-in-out;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 75%;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideUp 1s ease-in-out;
        }

        th, td {
            padding: 15px;
        }

        th {
            background: rgba(0,0,0,0.4);
        }

        tr {
            transition: 0.3s;
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.01);
        }

        a {
            text-decoration: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            margin: 2px;
            transition: 0.3s;
        }

        .edit {
            background: orange;
        }

        .delete {
            background: red;
        }

        .edit:hover {
            background: darkorange;
            transform: scale(1.1);
        }

        .delete:hover {
            background: darkred;
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes slideUp {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>
</head>

<body>

<h1>Student Management System</h1>

<!-- ADD -->
<form method="POST">
    <input type="text" name="name" placeholder="Enter Name" required>
    <input type="text" name="usn" placeholder="Enter USN" required>
    <button type="submit">Add Student</button>
</form>

<!-- SEARCH -->
<form method="GET">
    <input type="text" name="search" placeholder="Search by Name or USN" value="{{ search_query }}">
    <button type="submit">Search</button>
</form>

<!-- COUNT -->
<h3>Total Students: {{ total }}</h3>

<!-- TABLE -->
<table>
<tr>
    <th>Name</th>
    <th>USN</th>
    <th>Actions</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.usn }}</td>
    <td>
        <a href="/edit/{{ loop.index0 }}" class="edit">Edit</a>
        <a href="/delete/{{ loop.index0 }}" class="delete">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
