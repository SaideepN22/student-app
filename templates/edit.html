<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <style>
        body {
            font-family: Arial;
            background: #141e30;
            color: white;
            text-align: center;
        }

        form {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
        }
    </style>
</head>

<body>

<h1>Edit Student</h1>

<form method="POST">
    <input type="text" name="name" value="{{ student.name }}" required>
    <input type="text" name="usn" value="{{ student.usn }}" required>
    <br>
    <button type="submit">Update</button>
</form>

</body>
</html>
